<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JP 번역 도구</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0ede8; --card: #fff; --text: #1a1a1a; --sub: #888;
  --border: #e0dbd4; --accent: #2c5f2e; --accent-light: #e8f0e8;
  --danger: #c0392b; --shadow: 0 2px 12px rgba(0,0,0,0.07); --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 40px 16px; }
.card { background: var(--card); border-radius: 20px; box-shadow: var(--shadow); padding: 32px; width: 100%; max-width: 660px; }
.header { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
.header h1 { font-size: 20px; font-weight: 600; }
.header .sub { margin-left: auto; font-size: 12px; color: var(--sub); }

/* MODES */
.mode-row { display: flex; gap: 8px; margin-bottom: 16px; }
.pill { font-size: 12px; padding: 5px 16px; border-radius: 99px; cursor: pointer; border: 1.5px solid var(--border); background: var(--card); color: var(--sub); font-family: 'Noto Sans KR', sans-serif; transition: all 0.15s; }
.pill.sel { background: var(--text); color: var(--card); border-color: var(--text); }

/* INPUT */
.inp-wrap { position: relative; margin-bottom: 14px; }
textarea { width: 100%; min-height: 110px; resize: vertical; border: 1.5px solid var(--border); border-radius: 12px; padding: 12px 14px 28px; font-size: 15px; font-family: 'Noto Sans KR', sans-serif; outline: none; background: var(--bg); color: var(--text); line-height: 1.6; }
textarea:focus { border-color: #999; }
textarea::placeholder { color: #ccc; }
.cnt { position: absolute; bottom: 10px; right: 12px; font-size: 11px; color: #ccc; }

/* ACTIONS */
.actions { display: flex; gap: 8px; margin-bottom: 16px; }
.lang-btn { flex: 1; padding: 10px; font-size: 14px; font-weight: 500; border-radius: 10px; cursor: pointer; border: 1.5px solid var(--border); background: #f5f5f5; color: var(--text); font-family: 'Noto Sans KR', sans-serif; transition: all 0.15s; }
.lang-btn.off { background: var(--card); color: #ccc; border-color: #eee; }
.go-btn { padding: 10px 24px; font-size: 14px; font-weight: 600; border-radius: 10px; cursor: pointer; border: none; background: var(--text); color: var(--card); font-family: 'Noto Sans KR', sans-serif; white-space: nowrap; }
.go-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.status { font-size: 12px; color: var(--sub); min-height: 20px; margin-bottom: 12px; }

/* RESULTS */
.result { border: 1.5px solid #eee; border-radius: 12px; overflow: hidden; margin-bottom: 10px; }
.r-head { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: #f9f9f9; border-bottom: 1px solid #eee; }
.r-label { font-size: 12px; font-weight: 600; color: var(--sub); }
.copy-btn { font-size: 12px; padding: 3px 12px; border: 1px solid #e0e0e0; border-radius: 6px; cursor: pointer; background: var(--card); color: var(--sub); font-family: 'Noto Sans KR', sans-serif; }
.copy-btn.ok { color: var(--accent); border-color: var(--accent); }
.r-body { padding: 14px 16px; min-height: 70px; font-size: 15px; line-height: 1.75; }
.r-body.empty { color: #ccc; }
.r-body.err { color: var(--danger); font-size: 13px; }
.copy-all-btn { display: inline-flex; align-items: center; padding: 8px 18px; font-size: 13px; font-weight: 500; border-radius: 10px; cursor: pointer; border: 1.5px solid var(--accent); background: var(--accent-light); color: var(--accent); font-family: 'Noto Sans KR', sans-serif; transition: all 0.15s; }
.copy-all-btn:hover { background: var(--accent); color: #fff; }
.copy-all-btn.ok { background: var(--accent); color: #fff; }
.footer { margin-top: 20px; text-align: center; font-size: 11px; color: #ccc; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <span style="font-size:22px">🌐</span>
    <h1>JP 번역 도구</h1>
    <span class="sub">한국어 → 중국어 / 영어</span>
  </div>

  <div class="mode-row">
    <button class="pill sel" data-mode="business" onclick="setMode(this)">비즈니스</button>
    <button class="pill" data-mode="sns" onclick="setMode(this)">SNS / 캐주얼</button>
    <button class="pill" data-mode="email" onclick="setMode(this)">이메일</button>
  </div>

  <div class="inp-wrap">
    <textarea id="inp" placeholder="번역할 한국어 입력... (Ctrl+Enter로 번역)"
      oninput="document.getElementById('cnt').textContent=this.value.length+'자'"
      onkeydown="if(event.ctrlKey&&event.key==='Enter')go()"></textarea>
    <span class="cnt" id="cnt">0자</span>
  </div>

  <div class="actions">
    <button class="lang-btn" id="btn-cn" onclick="tog('cn')">✓ 🇨🇳 중국어</button>
    <button class="lang-btn" id="btn-en" onclick="tog('en')">✓ 🇺🇸 영어</button>
    <button class="go-btn" id="gobtn" onclick="go()">→ 번역</button>
  </div>

  <div class="status" id="status"></div>

  <div id="cn-box" class="result">
    <div class="r-head">
      <span class="r-label">🇨🇳 중국어</span>
      <button class="copy-btn" id="cp-cn" onclick="cp('cn-out','cp-cn')">복사</button>
    </div>
    <div class="r-body empty" id="cn-out">번역 결과 표시</div>
  </div>

  <div id="en-box" class="result">
    <div class="r-head">
      <span class="r-label">🇺🇸 영어</span>
      <button class="copy-btn" id="cp-en" onclick="cp('en-out','cp-en')">복사</button>
    </div>
    <div class="r-body empty" id="en-out">번역 결과 표시</div>
  </div>

  <div id="copy-all-wrap" style="display:none; margin-bottom:16px; text-align:right;">
    <button class="copy-all-btn" id="copy-all-btn" onclick="cpAll()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:5px"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>전체 복사
    </button>
  </div>

  <div class="footer">Powered by Claude · Easytech JP</div>
</div>

<script>
let mode = 'business';
let on = { cn: true, en: true };

function setMode(el) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('sel'));
  el.classList.add('sel');
  mode = el.dataset.mode;
}

function tog(lang) {
  on[lang] = !on[lang];
  const btn = document.getElementById('btn-' + lang);
  btn.classList.toggle('off', !on[lang]);
  btn.textContent = (on[lang] ? '✓ ' : '') + (lang === 'cn' ? '🇨🇳 중국어' : '🇺🇸 영어');
  document.getElementById(lang + '-box').style.display = on[lang] ? '' : 'none';
}

function setOut(id, text, cls) {
  const el = document.getElementById(id);
  el.className = 'r-body' + (cls ? ' ' + cls : '');
  el.textContent = text;
}

async function go() {
  const text = document.getElementById('inp').value.trim();
  if (!text) { document.getElementById('status').textContent = '⚠ 번역할 텍스트를 입력하세요.'; return; }
  const jobs = ['cn', 'en'].filter(l => on[l]);
  if (!jobs.length) { document.getElementById('status').textContent = '⚠ 언어를 선택하세요.'; return; }

  document.getElementById('gobtn').disabled = true;
  document.getElementById('status').textContent = '번역 중...';
  document.getElementById('copy-all-wrap').style.display = 'none';
  jobs.forEach(l => { setOut(l + '-out', '번역 중...', ''); document.getElementById(l + '-out').style.color = '#ccc'; });

  await Promise.all(jobs.map(async lang => {
    try {
      const r = await fetch('/api/translate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, lang, mode })
      });
      if (!r.ok) {
        const e = await r.text();
        setOut(lang + '-out', '오류 ' + r.status + ': ' + e.slice(0, 120), 'err');
      } else {
        const data = await r.json();
        setOut(lang + '-out', data.result || '결과 없음');
      }
    } catch (e) {
      setOut(lang + '-out', '네트워크 오류: ' + e.message, 'err');
    }
  }));

  document.getElementById('status').textContent = '완료 ✓';
  document.getElementById('gobtn').disabled = false;

  const hasResult = jobs.some(l => {
    const el = document.getElementById(l + '-out');
    return !el.classList.contains('empty') && !el.classList.contains('err');
  });
  document.getElementById('copy-all-wrap').style.display = hasResult ? '' : 'none';
}

async function cp(id, btnId) {
  const el = document.getElementById(id);
  if (el.classList.contains('empty') || el.classList.contains('err')) return;
  const btn = document.getElementById(btnId);
  try {
    await navigator.clipboard.writeText(el.textContent);
    btn.textContent = '✓ 복사됨';
    btn.classList.add('ok');
    setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('ok'); }, 1500);
  } catch (e) {}
}

async function cpAll() {
  const parts = [];
  const cnEl = document.getElementById('cn-out');
  const enEl = document.getElementById('en-out');
  if (on.cn && !cnEl.classList.contains('empty') && !cnEl.classList.contains('err'))
    parts.push('🇨🇳 ' + cnEl.textContent.trim());
  if (on.en && !enEl.classList.contains('empty') && !enEl.classList.contains('err'))
    parts.push('🇺🇸 ' + enEl.textContent.trim());
  if (!parts.length) return;
  const btn = document.getElementById('copy-all-btn');
  try {
    await navigator.clipboard.writeText(parts.join('\n\n'));
    btn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:5px"><polyline points="20 6 9 17 4 12"/></svg>복사됨!';
    btn.classList.add('ok');
    setTimeout(() => {
      btn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:5px"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>전체 복사';
      btn.classList.remove('ok');
    }, 1800);
  } catch (e) {}
}
</script>
</body>
</html>
